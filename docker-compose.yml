version: "3.9"

services:
  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_pw
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cms-network

  tomcat:
    build:
      context: .
      dockerfile: docker/tomcat/Dockerfile
    container_name: cms-tomcat
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cms_db
      DB_USER: cms_user
      DB_PASSWORD: cms_pw
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - cms-network

  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    container_name: cms-jenkins
    ports:
      - "8082:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - cms-network

    group_add:
      - "987"

networks:
  cms-network:

volumes:
  postgres_data:
  jenkins_home:
