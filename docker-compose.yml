version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cmsdb
      POSTGRES_USER: cmsuser
      POSTGRES_PASSWORD: cmspassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmsuser -d cmsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cms-network

  tomcat:
    build:
      context: .
      dockerfile: docker/tomcat/Dockerfile
    container_name: cms-tomcat
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cmsdb
      DB_USER: cmsuser
      DB_PASSWORD: cmspassword
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - cms-network

  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    container_name: cms-jenkins
    ports:
      - "8082:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
    networks:
      - cms-network

networks:
  cms-network:

volumes:
  postgres_data:
  jenkins_home:
